apiVersion: apps/v1
kind: Deployment
metadata:
  name: rss-aggregator
  labels:
    app: rss-aggregator
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: rss-aggregator
  template:
    metadata:
      labels:
        app: rss-aggregator
    spec:
      containers:
      - name: app
        image: ghcr.io/jepstar990/rss-aggregator:latest
        ports:
        - containerPort: 8000
          name: http
        envFrom:
        - configMapRef:
            name: rss-aggregator-config
        env:
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: rss-aggregator-secrets
              key: api-key
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health_api/health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health_api/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        volumeMounts:
        - name: data
          mountPath: /app/data
        - name: outputs
          mountPath: /app/outputs
      volumes:
      - name: data
        emptyDir: {}
      - name: outputs
        emptyDir: {}
